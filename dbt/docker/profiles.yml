medallion:
  target: dev
  outputs:
    dev:
      type: spark
      method: session
      master: spark://spark-iceberg:7077
      schema: bronze
      catalog: demo
      spark_conf:
        spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
        spark.sql.catalog.demo: org.apache.iceberg.spark.SparkCatalog
        spark.sql.catalog.demo.type: rest
        spark.sql.catalog.demo.uri: http://rest:8181
        spark.sql.catalog.demo.io-impl: org.apache.iceberg.hadoop.HadoopFileIO
        spark.sql.catalog.demo.warehouse: s3a://warehouse/
        spark.hadoop.fs.s3a.endpoint: http://minio:9000
        spark.sql.s3a.path.style.access: true
        spark.hadoop.fs.s3a.access.key: admin
        spark.hadoop.fs.s3a.secret.key: password
        spark.hadoop.fs.s3.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
      packages:
        - org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.8.1
        - org.apache.iceberg:iceberg-aws:1.8.1
        - org.apache.hadoop:hadoop-aws:3.3.4
        - com.amazonaws:aws-java-sdk-bundle:1.12.262
