version: "3.9"

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - ./raw_data:/data
    command: server /data --console-address ":9001"

  jupyter:
    image: jupyter/pyspark-notebook
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      - minio
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      PYSPARK_SUBMIT_ARGS: >
        --packages org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.550,org.apache.iceberg:iceberg-spark-runtime-3.3_2.12:1.5.0
        --conf spark.sql.catalog.demo=org.apache.iceberg.spark.SparkCatalog
        --conf spark.sql.catalog.demo.type=rest
        --conf spark.sql.catalog.demo.uri=http://rest:8181
        --conf spark.sql.catalog.demo.warehouse=s3://iceberg/warehouse
        --conf spark.sql.catalog.demo.s3.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=minioadmin
        --conf spark.hadoop.fs.s3a.secret.key=minioadmin123
        --conf spark.hadoop.fs.s3a.path.style.access=true
        pyspark-shell
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

  mc:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb local/iceberg 2>/dev/null || true &&
      mc mb local/iceberg/warehouse 2>/dev/null || true &&
      tail -f /dev/null
      "

  rest:
    image: iceberg-rest-s3:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: eu-west-2
      S3_ENDPOINT: http://minio:9000
      CATALOG_WAREHOUSE: s3://iceberg/warehouse
      CATALOG_IO_IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
    depends_on:
      - minio
